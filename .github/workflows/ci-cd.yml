name: CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: domiq44
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/domiq44/mon-app:latest
            ghcr.io/domiq44/mon-app:${{ github.sha }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        run: |
          echo "${KUBECONFIG_CONTENT}" > kubeconfig
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}

      - name: Deploy to k0s
        run: kubectl apply --validate=false -f k8s/
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig

      - name: Health check - wait for rollout
        run: kubectl rollout status deployment/mon-app --timeout=60s
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig

      - name: Rollback on failure
        if: failure()
        run: kubectl rollout undo deployment/mon-app
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig
